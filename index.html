function generateSOAPNote(quickNotes, patient) {
  const n = quickNotes.toLowerCase();
  // Extract vitals
  const bpMatch = quickNotes.match(/BP\s*(\d+\/\d+)/i);
  const bp = bpMatch ? bpMatch[1] : null;
  const hrMatch = quickNotes.match(/HR\s*(\d+)/i);
  const hr = hrMatch ? hrMatch[1] : null;
  const wtMatch = quickNotes.match(/(?:wt|weight)\s*(\d+)/i);
  const wt = wtMatch ? wtMatch[1] : null;
  const tempMatch = quickNotes.match(/(?:temp|temperature)\s*([\d.]+)/i);
  const temp = tempMatch ? tempMatch[1] : null;
  const o2Match = quickNotes.match(/O2\s*(?:sat)?\s*(\d+)/i);
  const o2 = o2Match ? o2Match[1] : null;

  // Extract age/sex
  const ageMatch = quickNotes.match(/(\d+)\s*(M|F|yo|y\/o)/i);
  const age = ageMatch ? ageMatch[1] : patient?.age || "";
  const sex = ageMatch ? ageMatch[2].toUpperCase() === "M" ? "male" : "female" : patient?.sex === "M" ? "male" : "female";

  // Determine conditions mentioned
  const conditions = [];
  const icd = [];
  if (n.includes("htn") || n.includes("hypertension") || n.includes("blood pressure") || n.includes("bp")) {
    conditions.push("Essential Hypertension");
    icd.push("I10");
  }
  if (n.includes("dm") || n.includes("diabet") || n.includes("a1c") || n.includes("glucose") || n.includes("metformin")) {
    conditions.push("Type 2 Diabetes Mellitus");
    icd.push("E11.9");
  }
  if (n.includes("anxiety") || n.includes("gad") || n.includes("anxious")) {
    conditions.push("Generalized Anxiety Disorder");
    icd.push("F41.1");
  }
  if (n.includes("gerd") || n.includes("reflux") || n.includes("heartburn")) {
    conditions.push("GERD");
    icd.push("K21.0");
  }
  if (n.includes("asthma") || n.includes("wheez") || n.includes("inhaler")) {
    conditions.push("Asthma");
    icd.push("J45.40");
  }
  if (n.includes("cholesterol") || n.includes("lipid") || n.includes("statin") || n.includes("hyperlipid")) {
    conditions.push("Hyperlipidemia");
    icd.push("E78.5");
  }
  if (n.includes("arthri") || n.includes("joint") || n.includes("knee") || n.includes("osteo")) {
    conditions.push("Osteoarthritis");
    icd.push("M17.9");
  }
  if (n.includes("depress") || n.includes("ssri") || n.includes("sertraline")) {
    conditions.push("Major Depressive Disorder");
    icd.push("F32.1");
  }
  if (n.includes("edema") || n.includes("swell")) {
    conditions.push("Peripheral Edema");
    icd.push("R60.0");
  }
  if (n.includes("allerg")) {
    conditions.push("Allergic Rhinitis");
    icd.push("J30.9");
  }

  // Add patient conditions if not already captured
  if (patient && conditions.length === 0) {
    patient.conds.forEach(c => {
      if (c.includes("Diabet")) {
        conditions.push(c);
        icd.push("E11.9");
      } else if (c.includes("Hypert")) {
        conditions.push(c);
        icd.push("I10");
      } else if (c.includes("Anxiety")) {
        conditions.push(c);
        icd.push("F41.1");
      } else if (c.includes("Asthma")) {
        conditions.push(c);
        icd.push("J45.40");
      } else {
        conditions.push(c);
        icd.push("—");
      }
    });
  }
  if (conditions.length === 0) {
    conditions.push("See clinical notes");
    icd.push("Z00.00");
  }

  // Determine trend
  const improving = n.includes("improv") || n.includes("better") || n.includes("stable") || n.includes("well controlled") || n.includes("lost") || n.includes("down");
  const worsening = n.includes("worse") || n.includes("increas") || n.includes("elevated") || n.includes("not controlled");
  const status = improving ? "improving with current management" : worsening ? "suboptimally controlled, requires adjustment" : "stable on current regimen";

  // Build SOAP
  let subjective = `${age}-year-old ${sex} presents for ${n.includes("f/u") || n.includes("follow") ? "follow-up" : "evaluation"} of ${conditions.slice(0, 2).join(" and ")}.`;
  subjective += `\nPatient reports: ${quickNotes.replace(/^\d+\s*(M|F)\s*/i, "").trim()}.`;
  if (improving) subjective += "\nOverall trending in positive direction.";
  if (n.includes("no") && (n.includes("chest pain") || n.includes("cp"))) subjective += "\nDenies chest pain.";
  if (n.includes("no") && (n.includes("headache") || n.includes("ha"))) subjective += "\nDenies headaches.";
  if (n.includes("no") && n.includes("sob")) subjective += "\nDenies shortness of breath.";
  let objective = "VITALS:";
  if (bp) objective += `\n  BP: ${bp} mmHg`;
  if (hr) objective += `\n  HR: ${hr} bpm`;
  if (wt) objective += `\n  Weight: ${wt} lbs`;
  if (temp) objective += `\n  Temp: ${temp}°F`;
  if (o2) objective += `\n  O2 Sat: ${o2}%`;
  if (!bp && !hr && !wt) objective += "\n  See nursing intake";
  objective += "\n\nGENERAL: Patient appears well, in no acute distress.";
  let assessment = conditions.map((c, i) => `${i + 1}. ${c} (${icd[i]}) — ${status}`).join("\n");
  let plan = "";
  conditions.forEach((c, i) => {
    plan += `${i + 1}. ${c}:\n`;
    if (c.includes("Hypert")) {
      plan += n.includes("increase") || n.includes("adjust") ? "   - Adjust antihypertensive medication as discussed\n   - Continue lifestyle modifications\n   - Recheck BP in 4-6 weeks\n" : "   - Continue current antihypertensive regimen\n   - Reinforce dietary sodium restriction\n   - Recheck BP at next visit\n";
    } else if (c.includes("Diabet")) {
      plan += "   - Continue current glycemic management\n   - Order HbA1c if overdue\n   - Reinforce dietary counseling\n   - Annual eye exam referral if not done\n";
    } else if (c.includes("Anxiety") || c.includes("Depress")) {
      plan += "   - Continue current SSRI regimen\n   - Discuss stress management techniques\n   - Follow-up in 3 months\n";
    } else if (c.includes("Asthma")) {
      plan += "   - Review inhaler technique\n   - Consider step-up therapy if symptoms persist\n   - Spirometry as scheduled\n";
    } else if (c.includes("Edema")) {
      plan += "   - Monitor, consider medication change if worsening\n   - Leg elevation and compression stockings\n   - Recheck in 2-4 weeks\n";
    } else {
      plan += "   - Continue current management\n   - Follow-up as needed\n";
    }
  });
  plan += `\nFollow-up: ${n.includes("6 week") ? "6 weeks" : n.includes("3 month") ? "3 months" : n.includes("4 week") ? "4 weeks" : "as scheduled"}`;
  return `SUBJECTIVE:\n${subjective}\n\nOBJECTIVE:\n${objective}\n\nASSESSMENT:\n${assessment}\n\nPLAN:\n${plan}`;
}
function generatePrepBrief(patients) {
  return patients.map(p => {
    const lastVisit = p.visits.at(-1);
    const urgent = p.labs.length > 0;
    let brief = `■ ${p.name} (${p.age}${p.sex})`;
    brief += `\n  Conditions: ${p.conds.join(", ")}`;
    brief += `\n  Current Meds: ${p.meds.join(", ")}`;
    if (urgent) brief += `\n  ⚠ PENDING: ${p.labs.join(", ")}`;
    if (lastVisit) {
      const daysSince = Math.floor((new Date("2026-03-20") - new Date(lastVisit.date)) / 86400000);
      brief += `\n  Last seen: ${lastVisit.date} (${daysSince} days ago)`;
      // Extract key action items from last SOAP
      const soap = lastVisit.soap.toLowerCase();
      if (soap.includes("recheck") || soap.includes("follow")) brief += "\n  → Due for recheck per previous plan";
      if (soap.includes("adjust") || soap.includes("increase") || soap.includes("consider")) brief += "\n  → Medication adjustment was discussed — confirm status";
      if (soap.includes("refer")) brief += "\n  → Referral was ordered — check if completed";
    }
    if (p.allg.length > 0) brief += `\n  Allergies: ${p.allg.join(", ")}`;
    return brief;
  }).join("\n\n");
}
function generateInboxReply(msg, patient) {
  const body = msg.body.toLowerCase();
  let reply = `Dear ${msg.from.split(" ")[0]},\n\nThank you for reaching out.`;
  if (body.includes("refill") || body.includes("running low") || body.includes("medication")) {
    const med = patient?.meds?.[0] || "your medication";
    reply += `\n\nI've submitted a refill for ${med} to your pharmacy on file. It should be ready for pickup within 24 hours. If you have any issues, please contact the pharmacy directly and have them fax our office.`;
  }
  if (body.includes("swelling") || body.includes("swell") || body.includes("edema")) {
    reply += `\n\nRegarding the swelling you mentioned — this can sometimes be a side effect of certain medications, particularly calcium channel blockers like amlodipine. I'd like to see you for a follow-up to examine this. Please schedule an appointment this week through our patient portal or call our office.`;
    reply += `\n\nIn the meantime, try elevating your legs when resting. If you experience sudden shortness of breath, chest pain, or if the swelling becomes severe or painful, please go to the nearest emergency department immediately.`;
  }
  if (body.includes("appointment") || body.includes("confirm") || body.includes("schedule")) {
    reply += `\n\nYour appointment is confirmed as scheduled. Please arrive 10 minutes early and bring your current medication list and insurance card.`;
  }
  if (body.includes("inhaler") || body.includes("rescue") || body.includes("breathing") || body.includes("pollen")) {
    reply += `\n\nIf you're needing your rescue inhaler daily, that suggests your asthma is not optimally controlled. I'd recommend coming in sooner so we can reassess your controller medication. Please call our office to schedule an appointment this week. In the meantime, continue your current controller inhaler as prescribed.`;
  }
  if (body.includes("lab") || body.includes("result") || body.includes("numbers")) {
    reply += `\n\nI'd be happy to review your lab results with you. Rather than explaining complex values over a message, I think it would be most helpful to discuss these during a brief appointment so I can answer all your questions and explain what the numbers mean for your health. Please schedule a follow-up at your convenience.`;
  }
  if (body.includes("knee") || body.includes("pain") || body.includes("worse") || body.includes("bother")) {
    reply += `\n\nRegarding your pain concerns — please schedule a follow-up so we can properly evaluate this. In the meantime, you may use over-the-counter acetaminophen as directed for comfort, and try applying ice for 15-20 minutes at a time.`;
  }
  reply += `\n\nPlease don't hesitate to reach out if you have any other questions or concerns.\n\nBest regards,\nDr. [Your Name]`;
  return reply;
}
function generateRosterAI(shifts, doctors) {
  const results = [];

  // 1. CRITICAL: Weekend coverage gaps
  [5, 6].forEach(d => {
    const dayShifts = shifts.filter(s => s.day === d);
    if (dayShifts.length === 0) {
      // Find best candidate to fill
      const candidates = doctors.filter(doc => {
        const hrs = shifts.filter(s => s.did === doc.id).reduce((a, s) => a + (s.e - s.s), 0);
        return hrs < doc.max - 6 && doc.pref.includes(d);
      });
      const best = candidates[0] || doctors.find(d2 => d2.type === "Locum" || d2.type === "Staff");
      const usedRooms = [...new Set(shifts.map(s => s.rm))];
      const freeRoom = RMS.find(r => !usedRooms.includes(r)) || "Room 101";
      results.push({
        priority: "high",
        title: `🚨 No coverage on ${FULL[d]}`,
        detail: `The clinic is completely unstaffed on ${FULL[d]}. ${best ? `Recommended: Assign ${best.name} (${best.spec}) from 9:00–15:00 in ${freeRoom}. They have capacity remaining.` : "No available providers found — consider hiring a locum."}`,
        fix: best ? {
          did: best.id,
          day: d,
          s: 9,
          e: 15,
          rm: freeRoom,
          label: `Add ${best.name.split(" ").pop()} to ${DAYS[d]} 9–15`
        } : null
      });
    }
  });

  // 2. CRITICAL: Weekday zero-coverage hours
  for (let d = 0; d < 5; d++) {
    const gapHours = [];
    for (let h = 8; h < 17; h++) {
      const covering = shifts.filter(s => s.day === d && s.s <= h && s.e > h);
      if (covering.length === 0) gapHours.push(h);
    }
    if (gapHours.length >= 2) {
      const startGap = Math.min(...gapHours);
      const endGap = Math.max(...gapHours) + 1;
      results.push({
        priority: "high",
        title: `⚠ No coverage ${DAYS[d]} ${startGap}:00–${endGap}:00`,
        detail: `${gapHours.length} hours with zero providers on ${FULL[d]}. Patients arriving during this window will have no physician available.`,
        fix: null
      });
    }
  }

  // 3. Overwork / burnout risk
  doctors.forEach(doc => {
    const docShifts = shifts.filter(s => s.did === doc.id);
    const hrs = docShifts.reduce((a, s) => a + (s.e - s.s), 0);
    const pct = Math.round(hrs / doc.max * 100);
    const daysWorked = [...new Set(docShifts.map(s => s.day))].length;
    if (pct >= 100) {
      results.push({
        priority: "high",
        title: `🔴 ${doc.name} is over capacity (${pct}%)`,
        detail: `Scheduled ${hrs}h against ${doc.max}h maximum. This exceeds safe working limits and increases risk of medical errors. Immediate action needed.`,
        fix: null
      });
    } else if (pct > 85) {
      results.push({
        priority: "medium",
        title: `${doc.name} at ${pct}% capacity`,
        detail: `Scheduled ${hrs}h of ${doc.max}h max across ${daysWorked} days. Approaching burnout threshold. Consider redistributing one shift.`,
        fix: null
      });
    }

    // 4. Consecutive day fatigue
    const sortedDays = [...new Set(docShifts.map(s => s.day))].sort();
    let maxConsecutive = 1,
      current = 1;
    for (let i = 1; i < sortedDays.length; i++) {
      if (sortedDays[i] === sortedDays[i - 1] + 1) {
        current++;
        maxConsecutive = Math.max(maxConsecutive, current);
      } else current = 1;
    }
    if (maxConsecutive >= 4) {
      results.push({
        priority: "medium",
        title: `${doc.name}: ${maxConsecutive} consecutive days`,
        detail: `Working ${maxConsecutive} days in a row without a break. Research shows clinical performance degrades significantly after 4+ consecutive days. Recommend inserting a rest day.`,
        fix: null
      });
    }

    // 5. Long shift detection
    docShifts.forEach(s => {
      if (s.e - s.s >= 10) {
        results.push({
          priority: "medium",
          title: `${doc.name}: ${s.e - s.s}h shift on ${DAYS[s.day]}`,
          detail: `Shifts over 10 hours significantly increase fatigue-related errors. Consider splitting into two shorter shifts or adding a relief provider for the afternoon portion.`,
          fix: null
        });
      }
    });
  });

  // 6. Single coverage risk
  const singleCovSlots = [];
  for (let d = 0; d < 5; d++) {
    for (let h = 8; h < 17; h++) {
      const covering = shifts.filter(s => s.day === d && s.s <= h && s.e > h);
      if (covering.length === 1) singleCovSlots.push({
        day: d,
        hour: h,
        doc: covering[0].did
      });
    }
  }
  if (singleCovSlots.length > 5) {
    const worstDay = DAYS[[0, 1, 2, 3, 4].reduce((worst, d) => singleCovSlots.filter(s => s.day === d).length > singleCovSlots.filter(s => s.day === worst).length ? d : worst, 0)];
    results.push({
      priority: "medium",
      title: `${singleCovSlots.length} single-coverage hours this week`,
      detail: `If the sole provider calls in sick during these hours, the clinic has zero coverage. Worst day: ${worstDay}. Consider adding a backup provider or staggering shifts for overlap.`,
      fix: null
    });
  }

  // 7. Room conflicts (two doctors same room same time)
  for (let d = 0; d < 7; d++) {
    const dayShifts = shifts.filter(s => s.day === d);
    for (let i = 0; i < dayShifts.length; i++) {
      for (let j = i + 1; j < dayShifts.length; j++) {
        const a = dayShifts[i],
          b = dayShifts[j];
        if (a.rm === b.rm && a.s < b.e && b.s < a.e) {
          const docA = doctors.find(x => x.id === a.did);
          const docB = doctors.find(x => x.id === b.did);
          results.push({
            priority: "high",
            title: `🏥 Room conflict: ${a.rm} on ${DAYS[d]}`,
            detail: `${docA?.name} (${a.s}:00–${a.e}:00) and ${docB?.name} (${b.s}:00–${b.e}:00) are both assigned to ${a.rm}. One must be moved to an available room.`,
            fix: null
          });
        }
      }
    }
  }

  // 8. Specialty distribution analysis
  const specByDay = {};
  for (let d = 0; d < 5; d++) {
    specByDay[d] = [...new Set(shifts.filter(s => s.day === d).map(s => doctors.find(x => x.id === s.did)?.spec).filter(Boolean))];
  }
  const allSpecs = [...new Set(doctors.map(d => d.spec))];
  allSpecs.forEach(spec => {
    const daysAvailable = Object.entries(specByDay).filter(([_, specs]) => specs.includes(spec)).length;
    if (daysAvailable <= 1 && doctors.filter(d => d.spec === spec).length > 0) {
      results.push({
        priority: "low",
        title: `${spec} only available ${daysAvailable} day(s)/week`,
        detail: `Patients needing ${spec} have very limited scheduling options. Consider adding another day for this specialty to reduce wait times and improve access.`,
        fix: null
      });
    }
  });

  // 9. Peak hour analysis
  const peakHours = {};
  for (let h = 8; h < 17; h++) {
    let total = 0;
    for (let d = 0; d < 5; d++) total += shifts.filter(s => s.day === d && s.s <= h && s.e > h).length;
    peakHours[h] = total;
  }
  const maxCov = Math.max(...Object.values(peakHours));
  const minCov = Math.min(...Object.values(peakHours));
  if (maxCov > 0 && minCov === 0) {
    const gapHour = Object.entries(peakHours).find(([_, v]) => v === 0);
    if (gapHour) {
      results.push({
        priority: "medium",
        title: `Coverage drops to zero at ${gapHour[0]}:00`,
        detail: `Across the week, ${gapHour[0]}:00 has no provider coverage on some days while peak hours have up to ${maxCov} providers. Staggering shift start times would create more even distribution.`,
        fix: null
      });
    }
  }

  // 10. Underutilized providers
  doctors.forEach(doc => {
    const hrs = shifts.filter(s => s.did === doc.id).reduce((a, s) => a + (s.e - s.s), 0);
    if (hrs < doc.max * 0.4 && hrs > 0) {
      results.push({
        priority: "low",
        title: `${doc.name} underutilized (${Math.round(hrs / doc.max * 100)}%)`,
        detail: `Only ${hrs}h of ${doc.max}h capacity used. ${doc.spec} expertise is available but not being fully leveraged. Could take on more patients or cover gap hours.`,
        fix: null
      });
    } else if (hrs === 0) {
      results.push({
        priority: "medium",
        title: `${doc.name} has zero shifts scheduled`,
        detail: `${doc.name} (${doc.spec}, ${doc.type}) is on the roster but has no shifts this week. Either assign shifts or confirm they are on leave.`,
        fix: null
      });
    }
  });

  // 11. Room utilization
  const usedRooms = [...new Set(shifts.map(s => s.rm))];
  const unusedRooms = RMS.filter(r => !usedRooms.includes(r));
  if (unusedRooms.length > 0) {
    results.push({
      priority: "low",
      title: `${unusedRooms.length} rooms unused all week`,
      detail: `${unusedRooms.join(", ")} — consider offering to visiting specialists or using for telehealth consultations to increase clinic revenue.`,
      fix: null
    });
  }

  // 12. Schedule efficiency score
  const totalScheduledHours = shifts.reduce((a, s) => a + (s.e - s.s), 0);
  const totalCapacity = doctors.reduce((a, d) => a + d.max, 0);
  const efficiency = Math.round(totalScheduledHours / totalCapacity * 100);
  const weekdayGaps = [0, 1, 2, 3, 4].reduce((count, d) => {
    for (let h = 8; h < 17; h++) {
      if (shifts.filter(s => s.day === d && s.s <= h && s.e > h).length === 0) count++;
    }
    return count;
  }, 0);
  results.push({
    priority: efficiency > 70 ? "low" : "medium",
    title: `📊 Schedule Efficiency Score: ${efficiency}%`,
    detail: `Using ${totalScheduledHours}h of ${totalCapacity}h total provider capacity. ${weekdayGaps} uncovered weekday hours. ${efficiency > 80 ? "Well optimized." : efficiency > 60 ? "Room for improvement — fill gap hours to increase patient throughput." : "Significant underutilization — consider consolidating schedules or adding patient volume."}`,
    fix: null
  });

  // Sort: high first, then medium, then low
  const order = {
    high: 0,
    medium: 1,
    low: 2
  };
  results.sort((a, b) => (order[a.priority] || 2) - (order[b.priority] || 2));
  return results;
}

  };

  // ── Extract clinical info from conversation transcript ──
  function extractClinicalNotes(text) {
    const t = text.toLowerCase();
    let notes = [];
    // Age/Sex
    const ageM = text.match(/(\d{1,3})\s*(?:year|yr|y\.?o)/i);
    if (ageM) notes.push(ageM[1] + " year old");
    if (t.includes("male") || t.includes(" man") || t.includes(" gentleman")) notes.push("male");
    if (t.includes("female") || t.includes(" woman") || t.includes(" lady")) notes.push("female");
    // Visit type
    if (t.includes("follow up") || t.includes("follow-up") || t.includes("came back") || t.includes("returning")) notes.push("f/u visit");
    if (t.includes("new patient") || t.includes("first time") || t.includes("first visit")) notes.push("new patient visit");
    // Vitals mentioned
    const bpM = text.match(/(\d{2,3}\s*(?:over|\/)\s*\d{2,3})/i);
    if (bpM) notes.push("BP " + bpM[1].replace(/\s*over\s*/i, "/"));
    const hrM = text.match(/(?:heart rate|pulse|HR)\s*(?:is|of|was)?\s*(\d{2,3})/i);
    if (hrM) notes.push("HR " + hrM[1]);
    const wtM = text.match(/(?:weight|weighs?)\s*(?:is|was)?\s*(\d{2,3})\s*(?:pounds|lbs|kg)?/i);
    if (wtM) notes.push("Wt " + wtM[1]);
    const tempM = text.match(/(?:temp|temperature)\s*(?:is|of|was)?\s*([\d.]+)/i);
    if (tempM) notes.push("Temp " + tempM[1]);
    // Symptoms
    const symptoms = [];
    if (t.includes("headache") || t.includes("head ache")) symptoms.push("headache");
    if (t.includes("chest pain") || t.includes("chest discomfort")) symptoms.push("chest pain");
    if (t.includes("shortness of breath") || t.includes("short of breath") || t.includes("difficulty breathing")) symptoms.push("SOB");
    if (t.includes("dizzy") || t.includes("dizziness") || t.includes("lightheaded")) symptoms.push("dizziness");
    if (t.includes("nausea") || t.includes("nauseous") || t.includes("throwing up") || t.includes("vomit")) symptoms.push("nausea/vomiting");
    if (t.includes("cough")) symptoms.push("cough");
    if (t.includes("fever") || t.includes("chills")) symptoms.push("fever/chills");
    if (t.includes("fatigue") || t.includes("tired") || t.includes("exhausted")) symptoms.push("fatigue");
    if (t.includes("swelling") || t.includes("swollen") || t.includes("edema")) symptoms.push("swelling");
    if (t.includes("pain")) {
      const painM = text.match(/(\w+)\s*pain/i);
      symptoms.push(painM ? painM[0] : "pain");
    }
    if (t.includes("rash") || t.includes("itching") || t.includes("itchy")) symptoms.push("rash/pruritus");
    if (t.includes("anxiety") || t.includes("anxious") || t.includes("worried") || t.includes("stress")) symptoms.push("anxiety");
    if (t.includes("insomnia") || t.includes("can't sleep") || t.includes("trouble sleeping")) symptoms.push("insomnia");
    if (t.includes("numbness") || t.includes("tingling")) symptoms.push("numbness/tingling");
    if (symptoms.length > 0) notes.push("Symptoms: " + symptoms.join(", "));
    // Negatives
    const denies = [];
    if (t.includes("no chest pain") || t.includes("denies chest pain")) denies.push("chest pain");
    if (t.includes("no headache") || t.includes("denies headache")) denies.push("headache");
    if (t.includes("no fever") || t.includes("no chills") || t.includes("afebrile")) denies.push("fever");
    if (t.includes("no shortness") || t.includes("no difficulty breathing")) denies.push("SOB");
    if (t.includes("no nausea") || t.includes("no vomiting")) denies.push("nausea/vomiting");
    if (denies.length > 0) notes.push("Denies: " + denies.join(", "));
    // Conditions
    if (t.includes("diabetes") || t.includes("diabetic") || t.includes("blood sugar") || t.includes("a1c")) notes.push("DM discussed");
    if (t.includes("hypertension") || t.includes("high blood pressure") || t.includes("blood pressure")) notes.push("HTN discussed");
    if (t.includes("asthma") || t.includes("inhaler") || t.includes("wheez")) notes.push("Asthma discussed");
    if (t.includes("cholesterol") || t.includes("lipid")) notes.push("Hyperlipidemia discussed");
    if (t.includes("depression") || t.includes("depressed")) notes.push("Depression discussed");
    // Medications mentioned
    const meds = [];
    const medList = ["metformin", "lisinopril", "amlodipine", "atorvastatin", "omeprazole", "sertraline", "fluticasone", "albuterol", "hydrochlorothiazide", "losartan", "gabapentin", "levothyroxine", "pantoprazole", "ibuprofen", "acetaminophen", "aspirin", "prednisone", "amoxicillin", "azithromycin", "insulin"];
    medList.forEach(med => {
      if (t.includes(med)) meds.push(med);
    });
    if (meds.length > 0) notes.push("Medications discussed: " + meds.join(", "));
    // Plan items
    const planItems = [];
    if (t.includes("continue") || t.includes("keep taking")) planItems.push("continue current regimen");
    if (t.includes("increase") || t.includes("raise the dose") || t.includes("bump up")) planItems.push("increase medication dose");
    if (t.includes("decrease") || t.includes("lower") || t.includes("reduce")) planItems.push("decrease dose");
    if (t.includes("new medication") || t.includes("start") || t.includes("prescribe") || t.includes("begin")) planItems.push("start new medication");
    if (t.includes("lab") || t.includes("blood work") || t.includes("blood test")) planItems.push("order labs");
    if (t.includes("x-ray") || t.includes("xray") || t.includes("imaging") || t.includes("ct scan") || t.includes("mri")) planItems.push("order imaging");
    if (t.includes("refer") || t.includes("specialist") || t.includes("see a")) planItems.push("referral discussed");
    if (t.includes("come back") || t.includes("follow up") || t.includes("see you") || t.includes("return")) {
      const wkM = text.match(/(\d+)\s*weeks?/i);
      const moM = text.match(/(\d+)\s*months?/i);
      planItems.push("f/u " + (wkM ? wkM[1] + " weeks" : moM ? moM[1] + " months" : "as needed"));
    }
    if (planItems.length > 0) notes.push("Plan: " + planItems.join(", "));
    // Build output
    if (notes.length === 0) return text.slice(0, 500);
    return notes.join(". ") + ".\n\n[Full transcript available for review]";
  }

  // ── Voice Recording ──
  const startRecording = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      fl("Speech recognition not supported. Use Chrome or Safari.", "error");
      return;
    }
    const rec = new SR();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = "en-US";
    let final = transcript;
    rec.onresult = e => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript + " ";else interim += e.results[i][0].transcript;
